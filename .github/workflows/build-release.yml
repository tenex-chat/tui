name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  MACOS_ARM64_TARGET: aarch64-apple-darwin
  MACOS_X86_64_TARGET: x86_64-apple-darwin

jobs:
  build-rust-clients:
    name: Build Rust Clients (macOS Universal)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: rust-${{ runner.os }}-clients-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-clients-

      - name: Build Rust binaries
        run: |
          cargo build -p tenex-tui --release --target ${{ env.MACOS_ARM64_TARGET }}
          cargo build -p tenex-tui --release --target ${{ env.MACOS_X86_64_TARGET }}

          cargo build -p tenex-repl --release --target ${{ env.MACOS_ARM64_TARGET }}
          cargo build -p tenex-repl --release --target ${{ env.MACOS_X86_64_TARGET }}

          cargo build -p tenex-cli --release --target ${{ env.MACOS_ARM64_TARGET }}
          cargo build -p tenex-cli --release --target ${{ env.MACOS_X86_64_TARGET }}

      - name: Package universal Rust binaries
        run: |
          mkdir -p dist

          for bin in tenex-tui tenex-repl tenex-cli; do
            lipo -create \
              target/${{ env.MACOS_ARM64_TARGET }}/release/$bin \
              target/${{ env.MACOS_X86_64_TARGET }}/release/$bin \
              -output dist/$bin
            chmod +x dist/$bin
          done

          tar -czf tenex-rust-clients-macos-universal.tar.gz -C dist tenex-tui tenex-repl tenex-cli
          shasum -a 256 tenex-rust-clients-macos-universal.tar.gz > tenex-rust-clients-macos-universal.sha256

      - name: Upload Rust client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-clients-artifacts
          path: |
            tenex-rust-clients-macos-universal.tar.gz
            tenex-rust-clients-macos-universal.sha256

  build-ios-client:
    name: Build iOS Client
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-ios

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: rust-${{ runner.os }}-ios-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-ios-

      - name: Install Tuist
        run: |
          brew update
          brew tap tuist/tuist
          brew install --formula tuist
          tuist version

      - name: Generate Xcode project
        run: |
          cd ios-app
          tuist generate

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios-app/TenexMVP.xcodeproj \
            -scheme TenexMVP \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios-app/DerivedData-iOS \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS device app (unsigned)
        run: |
          xcodebuild \
            -project ios-app/TenexMVP.xcodeproj \
            -scheme TenexMVP \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath ios-app/DerivedData-iOS \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS artifacts
        run: |
          SIM_APP="ios-app/DerivedData-iOS/Build/Products/Release-iphonesimulator/TenexMVP.app"
          DEVICE_APP="ios-app/DerivedData-iOS/Build/Products/Release-iphoneos/TenexMVP.app"

          test -d "$SIM_APP"
          test -d "$DEVICE_APP"

          ditto -c -k --sequesterRsrc --keepParent "$SIM_APP" tenex-ios-client-simulator.zip
          ditto -c -k --sequesterRsrc --keepParent "$DEVICE_APP" tenex-ios-client-device-unsigned.zip

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-client-artifacts
          path: |
            tenex-ios-client-simulator.zip
            tenex-ios-client-device-unsigned.zip

  build-mac-app:
    name: Build macOS App + DMG
    runs-on: macos-15
    env:
      DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
      DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: 456SHKPP26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: rust-${{ runner.os }}-mac-app-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-mac-app-

      - name: Install Tuist
        run: |
          brew update
          brew tap tuist/tuist
          brew install --formula tuist
          tuist version

      - name: Generate Xcode project
        run: |
          cd ios-app
          tuist generate

      - name: Build macOS app
        run: |
          xcodebuild \
            -project ios-app/TenexMVP.xcodeproj \
            -scheme TenexMVP \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath ios-app/DerivedData-mac \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Import signing certificate
        if: ${{ env.DEVELOPER_ID_P12 != '' && env.DEVELOPER_ID_PASSWORD != '' }}
        id: signing
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign macOS app
        if: ${{ steps.signing.outcome == 'success' }}
        run: |
          APP="ios-app/DerivedData-mac/Build/Products/Release/TenexMVP.app"
          test -d "$APP"

          codesign --force --deep --options runtime --timestamp --sign "Developer ID Application" "$APP"
          codesign --verify --verbose=2 "$APP"

      - name: Create DMG
        run: |
          APP="ios-app/DerivedData-mac/Build/Products/Release/TenexMVP.app"
          test -d "$APP"

          rm -rf dist-dmg
          mkdir -p dist-dmg
          cp -R "$APP" dist-dmg/TENEX.app

          hdiutil create -volname "TENEX" -srcfolder dist-dmg -ov -format UDZO tenex-macos-app.dmg

      - name: Sign DMG
        if: ${{ steps.signing.outcome == 'success' }}
        run: |
          codesign --force --timestamp --sign "Developer ID Application" tenex-macos-app.dmg
          codesign --verify --verbose=2 tenex-macos-app.dmg

      - name: Notarize DMG
        if: ${{ steps.signing.outcome == 'success' && env.APPLE_ID != '' && env.APPLE_ID_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcrun notarytool submit tenex-macos-app.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple tenex-macos-app.dmg

      - name: Checksum DMG
        run: shasum -a 256 tenex-macos-app.dmg > tenex-macos-app.sha256

      - name: Upload macOS app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-app-artifacts
          path: |
            tenex-macos-app.dmg
            tenex-macos-app.sha256

      - name: Cleanup keychain
        if: always() && steps.signing.outcome == 'success'
        run: |
          security delete-keychain "${{ steps.signing.outputs.keychain_path }}" 2>/dev/null || true

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-rust-clients
      - build-ios-client
      - build-mac-app

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          merge-multiple: true
          path: release-assets

      - name: Verify release assets
        run: ls -lah release-assets

      - name: Create release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/tenex-rust-clients-macos-universal.tar.gz
            release-assets/tenex-rust-clients-macos-universal.sha256
            release-assets/tenex-ios-client-simulator.zip
            release-assets/tenex-ios-client-device-unsigned.zip
            release-assets/tenex-macos-app.dmg
            release-assets/tenex-macos-app.sha256
          generate_release_notes: true
          overwrite_files: true

      - name: Create latest release (on master push)
        if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            release-assets/tenex-rust-clients-macos-universal.tar.gz
            release-assets/tenex-rust-clients-macos-universal.sha256
            release-assets/tenex-ios-client-simulator.zip
            release-assets/tenex-ios-client-device-unsigned.zip
            release-assets/tenex-macos-app.dmg
            release-assets/tenex-macos-app.sha256
          overwrite_files: true
          body: |
            Automated build from master (${{ github.sha }}).

            Included artifacts:
            - `tenex-rust-clients-macos-universal.tar.gz` (`tenex-tui`, `tenex-repl`, `tenex-cli`)
            - `tenex-ios-client-simulator.zip`
            - `tenex-ios-client-device-unsigned.zip`
            - `tenex-macos-app.dmg`
